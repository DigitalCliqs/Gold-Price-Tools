<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate the value of scrap gold?","acceptedAnswer":{"@type":"Answer","text":"To calculate scrap gold value: (1) Weigh your gold in grams. (2) Identify the karat (stamped as 9K, 14K, 18K, etc.). (3) Multiply the weight in grams by the purity factor (e.g., 0.5833 for 14K). (4) Multiply by the current gold price per gram. The result is the melt value of your scrap gold."}},{"@type":"Question","name":"What is melt value of scrap gold?","acceptedAnswer":{"@type":"Answer","text":"Melt value is the intrinsic value of the pure gold content in a piece, calculated using the live spot price. Scrap dealers typically pay 70–90% of melt value to cover smelting, refining costs, and profit margin."}},{"@type":"Question","name":"How much do scrap gold dealers pay per gram?","acceptedAnswer":{"@type":"Answer","text":"Scrap gold dealers typically pay 70–90% of the calculated melt value. For example, if your 14K gold has a melt value of $62/gram, a dealer might offer $43–$56/gram. Prices vary by dealer, volume, and current market conditions."}},{"@type":"Question","name":"What is the difference between karat and carat for gold?","acceptedAnswer":{"@type":"Answer","text":"Karat (K or kt) measures gold purity in the USA and Canada. Carat (ct) is used for the same purpose in the UK, Australia, and some other countries. They mean exactly the same thing for gold — 18K and 18ct are identical in purity at 75% pure gold."}}]}</script>
