# Cloudflare Worker config for GoldPriceTools price proxy
# Deploy: wrangler deploy  (from /worker/ directory)
# Set secret: wrangler secret put GOLDAPI_KEY

name = "gold-price-proxy"
main = "gold-proxy.js"
compatibility_date = "2025-01-01"

[[routes]]
pattern = "goldpricetools.com/api/*"
zone_name = "goldpricetools.com"

[observability]
enabled = true
