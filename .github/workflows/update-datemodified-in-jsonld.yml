name: Update dateModified in JSON-LD

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: push-sync
  cancel-in-progress: false

jobs:
  update-dates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update dateModified in all HTML files
        run: |
          TODAY=$(date -u +"%Y-%m-%d")T06:00:00Z
          echo "Updating dateModified to $TODAY"
          find . -name "*.html" -not -path "./.git/*" | while read file; do
            sed -i "s/\"dateModified\":\"[0-9T:Z-]*\"/\"dateModified\":\"$TODAY\"/g" "$file"
          done
          # Also update visible datetime elements
          find . -name "*.html" -not -path "./.git/*" | while read file; do
            sed -i "s|<time datetime=\"[0-9-]*\"|<time datetime=\"$(date -u +"%Y-%m-%d")\"|g" "$file"
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/DigitalCliqs/Gold-Price-Tools.git"
          git add -A
          git commit -m "chore: update dateModified to $(date -u +"%Y-%m-%d") [skip ci]"

          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=0

          while [ $RETRY_COUNT -le $MAX_RETRIES ]; do
            if git push origin main; then
              echo "Push successful"
              SUCCESS=1
              break
            else
              echo "Push failed, attempting rebase..."
              git pull --rebase origin main

              RETRY_COUNT=$((RETRY_COUNT+1))
              if [ $RETRY_COUNT -eq 1 ]; then
                sleep 5
              elif [ $RETRY_COUNT -eq 2 ]; then
                sleep 10
              elif [ $RETRY_COUNT -eq 3 ]; then
                sleep 15
              fi
            fi
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "Failed to push after $MAX_RETRIES retries."
            exit 1
          fi

      - name: Notify IndexNow of changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "goldpricetools.com",
              "key": "c130c8f5c62afdad5aa9e8e447271b62",
              "keyLocation": "https://goldpricetools.com/c130c8f5c62afdad5aa9e8e447271b62.txt",
              "urlList": ["https://goldpricetools.com/sitemap.xml"]
            }' || true
