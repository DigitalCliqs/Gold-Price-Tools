name: Update dateModified in JSON-LD

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: push-sync
  cancel-in-progress: false

jobs:
  update-dates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update dateModified in all HTML files
        run: |
          TODAY=$(date -u +"%Y-%m-%d")T06:00:00Z
          echo "Updating dateModified to $TODAY"
          find . -name "*.html" -not -path "./.git/*" | while read file; do
            sed -i "s/\"dateModified\":\"[0-9T:Z-]*\"/\"dateModified\":\"$TODAY\"/g" "$file"
          done
          # Also update visible datetime elements
          find . -name "*.html" -not -path "./.git/*" | while read file; do
            sed -i "s|<time datetime=\"[0-9-]*\"|<time datetime=\"$(date -u +"%Y-%m-%d")\"|g" "$file"
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: update dateModified to $(date -u +"%Y-%m-%d")"

          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=0

          while [ $RETRY_COUNT -le $MAX_RETRIES ]; do
            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/DigitalCliqs/Gold-Price-Tools.git HEAD:main; then
              echo "Push successful"
              SUCCESS=1
              break
            else
              echo "Push failed, attempting rebase..."
              git pull --rebase https://x-access-token:${{ secrets.GH_PAT }}@github.com/DigitalCliqs/Gold-Price-Tools.git main

              RETRY_COUNT=$((RETRY_COUNT+1))
              if [ $RETRY_COUNT -eq 1 ]; then
                sleep 5
              elif [ $RETRY_COUNT -eq 2 ]; then
                sleep 10
              elif [ $RETRY_COUNT -eq 3 ]; then
                sleep 15
              fi
            fi
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "Failed to push after $MAX_RETRIES retries."
            exit 1
          fi

      - name: Ping IndexNow (Bing)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s -X GET "https://api.indexnow.org/indexnow?url=https://goldpricetools.com/sitemap.xml&key=YOUR_INDEXNOW_KEY" || true
