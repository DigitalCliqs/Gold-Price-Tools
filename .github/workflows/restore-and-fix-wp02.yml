name: restore-and-fix-wp02

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-and-fix-wp02.yml'
      - '.github/scripts/inject_consent.py'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore HTML files from good commit using git checkout
        run: |
          GOOD="e23d59561ca40153e7a43489cd7ea5a8cb977361"
          git checkout $GOOD -- \
            index.html \
            14k-gold-price-per-gram.html \
            18k-gold-price-per-gram.html \
            10k-gold-price-per-gram.html \
            scrap-gold-calculator.html \
            silver-price-per-kilo.html \
            how-many-grams-in-troy-ounce.html \
            about.html \
            contact.html \
            privacy-policy.html \
            terms.html
          git checkout $GOOD -- \
            guides/best-time-to-sell-scrap-gold.html \
            guides/gold-price-history.html \
            guides/gold-purity-guide.html \
            guides/gold-vs-silver-investment.html \
            guides/how-to-calculate-scrap-gold.html \
            guides/how-to-invest-in-gold.html \
            guides/how-to-read-gold-spot-price.html \
            guides/how-to-sell-gold-jewellery.html \
            guides/silver-price-per-gram-explained.html \
            guides/troy-ounce-vs-gram-explained.html \
            guides/what-is-14k-gold.html \
            guides/what-is-925-sterling-silver.html
          echo "Restored sizes:"
          wc -c index.html guides/what-is-14k-gold.html

      - name: Inject Consent Mode v2 + GA4
        run: python3 .github/scripts/inject_consent.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "fix(wp-02): restore all 23 pages + Consent Mode v2 + GA4" || echo "Nothing to commit"
          git push
