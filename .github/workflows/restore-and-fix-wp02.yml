name: restore-and-fix-wp02

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore HTML files from good commit
        run: |
          GOOD_SHA="e23d59561ca40153e7a43489cd7ea5a8cb977361"
          for f in index.html 14k-gold-price-per-gram.html 18k-gold-price-per-gram.html 10k-gold-price-per-gram.html scrap-gold-calculator.html silver-price-per-kilo.html how-many-grams-in-troy-ounce.html about.html contact.html privacy-policy.html terms.html; do
            git show ${GOOD_SHA}:${f} > ${f}
            echo "Restored ${f}"
          done
          for g in best-time-to-sell-scrap-gold gold-price-history gold-purity-guide gold-vs-silver-investment how-to-calculate-scrap-gold how-to-invest-in-gold how-to-read-gold-spot-price how-to-sell-gold-jewellery silver-price-per-gram-explained troy-ounce-vs-gram-explained what-is-14k-gold what-is-925-sterling-silver; do
            git show ${GOOD_SHA}:guides/${g}.html > guides/${g}.html
            echo "Restored guides/${g}.html"
          done

      - name: Inject Consent Mode v2 + GA4 into all pages
        run: |
          python3 - << 'PYEOF'
          import re, glob

          CONSENT_BLOCK = """<!-- Consent Mode v2 defaults - must fire BEFORE AdSense and GA4 config -->
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('consent', 'default', {
              'ad_storage':          'denied',
              'analytics_storage':   'denied',
              'ad_user_data':        'denied',
              'ad_personalization':  'denied',
              'wait_for_update':     500
            });
          </script>
          <!-- Google Analytics 4 -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZPLL52C3K8"></script>
          <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-ZPLL52C3K8');</script>"""

          ADSENSE_TAG = '<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8849494330640880" crossorigin="anonymous"></script>'
          ADSENSE_FULL = '<!-- AdSense publisher script loaded async in head as required by Google policy -->\n' + ADSENSE_TAG

          for fpath in glob.glob('*.html') + glob.glob('guides/*.html'):
              with open(fpath, 'r') as f: content = f.read()
              content = re.sub(r'\n?<script async src="https://www\.googletagmanager\.com/gtag/js\?id=G-ZPLL52C3K8"></script>\n<script>window\.dataLayer=window\.dataLayer\|\|\[\];function gtag\(\)\{dataLayer\.push\(arguments\);}gtag\(\'js\',new Date\(\)\);gtag\(\'config\',\'G-ZPLL52C3K8\'\);</script>', '', content)
              content = re.sub(r'<!-- AdSense publisher script[^\n]*-->\n' + re.escape(ADSENSE_TAG), '', content)
              content = content.replace(ADSENSE_TAG, '')
              content = re.sub(r'\n{3,}', '\n\n', content)
              inject = CONSENT_BLOCK + '\n' + ADSENSE_FULL + '\n'
              preconnect = re.compile(r'(<link rel="preconnect" href="https://fonts\.googleapis\.com">)')
              if preconnect.search(content):
                  content = preconnect.sub(inject + r'\1', content, count=1)
              else:
                  content = content.replace('</head>', inject + '</head>', 1)
              with open(fpath, 'w') as f: f.write(content)
              print(f'Processed {fpath}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(wp-02): restore all 23 pages + Consent Mode v2 + GA4\n\nRestores all HTML from good commit e23d595. Adds Consent Mode v2\ndefaults and GA4 to all pages. Script order: Consent v2 -> GA4 ->\nAdSense on all 23 pages. Closes #2"
          git push
