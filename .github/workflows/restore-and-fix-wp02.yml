name: restore-and-fix-wp02

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-and-fix-wp02.yml'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore HTML files from good commit
        run: |
          GOOD_SHA="e23d59561ca40153e7a43489cd7ea5a8cb977361"
          for f in index.html 14k-gold-price-per-gram.html 18k-gold-price-per-gram.html 10k-gold-price-per-gram.html scrap-gold-calculator.html silver-price-per-kilo.html how-many-grams-in-troy-ounce.html about.html contact.html privacy-policy.html terms.html; do
            git show ${GOOD_SHA}:${f} > ${f}
            echo "Restored ${f}"
          done
          for g in best-time-to-sell-scrap-gold gold-price-history gold-purity-guide gold-vs-silver-investment how-to-calculate-scrap-gold how-to-invest-in-gold how-to-read-gold-spot-price how-to-sell-gold-jewellery silver-price-per-gram-explained troy-ounce-vs-gram-explained what-is-14k-gold what-is-925-sterling-silver; do
            git show ${GOOD_SHA}:guides/${g}.html > guides/${g}.html
            echo "Restored guides/${g}.html"
          done

      - name: Inject Consent Mode v2 + GA4 into all pages
        run: |
          cat > /tmp/inject.py << 'PYEOF'
          import re, glob

          CONSENT = '''<!-- Consent Mode v2 defaults - must fire BEFORE AdSense and GA4 config -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("consent", "default", {
    "ad_storage":          "denied",
    "analytics_storage":   "denied",
    "ad_user_data":        "denied",
    "ad_personalization":  "denied",
    "wait_for_update":     500
  });
</script>
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZPLL52C3K8"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-ZPLL52C3K8");</script>'''

          ADSENSE = '<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8849494330640880" crossorigin="anonymous"></script>'
          ADSENSE_BLOCK = '<!-- AdSense publisher script -->' + chr(10) + ADSENSE

          for fpath in glob.glob('*.html') + glob.glob('guides/*.html'):
              with open(fpath) as f: c = f.read()
              c = re.sub(r'\n?<script async src="https://www\.googletagmanager[^<]+</script>\n<script>window\.dataLayer[^<]+</script>', '', c)
              c = re.sub(r'<!-- AdSense[^\n]*-->\n' + re.escape(ADSENSE), '', c)
              c = c.replace(ADSENSE, '')
              c = re.sub(r'\n{3,}', '\n\n', c)
              block = CONSENT + chr(10) + ADSENSE_BLOCK + chr(10)
              m = re.search(r'(<link rel="preconnect" href="https://fonts\.googleapis\.com">)', c)
              if m:
                  c = c[:m.start()] + block + c[m.start():]
              else:
                  c = c.replace('</head>', block + '</head>', 1)
              with open(fpath, 'w') as f: f.write(c)
              print('OK', fpath)
          PYEOF
          python3 /tmp/inject.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "fix(wp-02): restore all 23 pages + Consent Mode v2 + GA4" || echo "Nothing to commit"
          git push
