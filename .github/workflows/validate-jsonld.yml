name: Validate JSON-LD Structured Data

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/validate-jsonld.js'
      - '.github/workflows/validate-jsonld.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/validate-jsonld.js'
      - '.github/workflows/validate-jsonld.yml'

jobs:
  validate-jsonld:
    name: Validate JSON-LD (WP-61)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run JSON-LD Validator
        id: validate
        run: node scripts/validate-jsonld.js

      - name: Summary
        if: always()
        run: |
          echo "### JSON-LD Validation" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "✅ All JSON-LD blocks valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ JSON-LD errors detected — check the **Run JSON-LD Validator** step above" >> $GITHUB_STEP_SUMMARY
          fi
