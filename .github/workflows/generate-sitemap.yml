name: Generate Sitemap

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/generate-sitemap.js'
      - '.github/workflows/generate-sitemap.yml'

concurrency:
  group: push-sync
  cancel-in-progress: false

jobs:
  generate-sitemap:
    name: Auto-generate sitemap.xml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: regenerate sitemap.xml [skip ci]"

          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=0

          while [ $RETRY_COUNT -le $MAX_RETRIES ]; do
            if git push; then
              echo "Push successful"
              SUCCESS=1
              break
            else
              echo "Push failed, attempting rebase..."
              git pull --rebase origin main

              RETRY_COUNT=$((RETRY_COUNT+1))
              if [ $RETRY_COUNT -eq 1 ]; then
                sleep 5
              elif [ $RETRY_COUNT -eq 2 ]; then
                sleep 10
              elif [ $RETRY_COUNT -eq 3 ]; then
                sleep 15
              fi
            fi
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "Failed to push after $MAX_RETRIES retries."
            exit 1
          fi
